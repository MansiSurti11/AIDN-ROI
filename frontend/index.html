<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI-AIDN: Selective HR Recovery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ROI-AIDN</h1>
            <p class="subtitle">Selective Region-of-Interest HR Recovery Tool</p>
        </header>

        <main>
            <section class="tabs glass">
                <button id="tabEncode" class="tab-btn active">Step 1: Encode HD</button>
                <button id="tabRestore" class="tab-btn">Step 2: Restore ROI</button>
            </section>

            <section id="encodeSection" class="controls glass">
                <div class="upload-section">
                    <label for="hdUpload" class="btn btn-primary">
                        <span>Upload Original HD Photo</span>
                        <input type="file" id="hdUpload" accept="image/*" hidden>
                    </label>
                </div>
                <div class="params-section">
                    <div class="input-group">
                        <label for="encodeScale">Target Scale</label>
                        <input type="number" id="encodeScale" value="2.0" step="0.1" min="1.1" max="4.0">
                    </div>
                    <button id="encodeBtn" class="btn btn-success" disabled>Generate Embedded LR</button>
                </div>
                
                <div id="progressContainer" class="progress-container hidden">
                    <div class="progress-bar-wrapper">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <span id="progressLabel">0%</span>
                </div>

                <div class="status-section">
                    <p id="encodeStatus">Upload an original High-Resolution image to encode.</p>
                </div>
            </section>

            <section id="restoreSection" class="controls glass hidden">
                <div class="upload-section">
                    <label for="imageUpload" class="btn btn-primary">
                        <span>Upload Embedded Image</span>
                        <input type="file" id="imageUpload" accept="image/*" hidden>
                    </label>
                </div>
                <div class="params-section">
                    <div class="input-group">
                        <label for="scaleFactor">Scale Factor</label>
                        <input type="number" id="scaleFactor" value="2.0" step="0.1" min="1.1" max="4.0">
                    </div>
                    <button id="restoreBtn" class="btn btn-success" disabled>Restore Selected ROI</button>
                    <button id="compareBtn" class="btn btn-info" disabled>Compare ROI</button>
                    <button id="resetBtn" class="btn btn-danger" disabled>Reset</button>
                </div>
                <div class="status-section">
                    <p id="statusMsg">Upload an image to get started.</p>
                </div>
            </section>

            <section class="canvas-section glass">
                <div id="canvasWrapper">
                    <canvas id="imageCanvas"></canvas>
                    <div id="roiOverlay" class="roi-overlay"></div>
                </div>
            </section>
        </main>

        <section id="resultSection" class="result-section glass hidden">
            <h3>Comparison Results</h3>
            <div id="comparisonContainer">
                <img id="comparisonImg" src="" alt="ROI Comparison">
            </div>
            <button id="closeResultBtn" class="btn btn-secondary">Close</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
